<style>
:root {
  --bg: #080c16; --surface: #0f1623; --surface2: #1a2233;
  --border: #252e42; --border2: #1e2840;
  --text: #edf0f7; --text2: #8b96b0; --text3: #556070;
  --pos: #22c55e; --neg: #ef4444; --warn: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); }

/* HEADER */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.hdr-brand { display: flex; align-items: center; gap: 10px; }
.hdr-logo { font-size: 22px; }
.hdr-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
.hdr-sub { font-size: 11px; color: var(--text3); }
.hdr-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text3); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-live { background: var(--pos); box-shadow: 0 0 6px var(--pos); }
.dot-stale { background: var(--warn); }

/* NAV */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; }
.nav-btn { padding: 10px 18px; border: none; background: none; color: var(--text3); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav-btn:hover { color: var(--text2); }
.nav-btn.active { color: var(--text); border-bottom-color: #a78bfa; }

/* PAGES */
.page { display: none; }
.page.active { display: block; }
.wrap { max-width: 1360px; margin: 0 auto; padding: 22px 24px; }

/* CARDS */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 22px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; }
.card-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
.card-val { font-size: 22px; font-weight: 700; line-height: 1; }
.card-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.pos { color: var(--pos); } .neg { color: var(--neg); } .warn { color: var(--warn); } .muted { color: var(--text2); }

/* TWO-COL */
.two-col { display: grid; grid-template-columns: 290px 1fr; gap: 14px; align-items: start; }
@media(max-width:860px){ .two-col { grid-template-columns:1fr; } }

/* PANEL */
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.panel-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }

/* DONUT */
.donut-wrap { position: relative; width: 190px; height: 190px; margin: 0 auto 14px; }
.donut-center { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
.donut-center-val { font-size: 22px; font-weight: 700; }
.donut-center-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; }
.legend { display: flex; flex-direction: column; gap: 6px; }
.legend-row { display: flex; align-items: center; gap: 7px; border: 1px solid transparent; border-radius: 7px; padding: 2px 4px; margin: 0 -4px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.legend-name { font-size: 11px; color: var(--text2); flex: 1; }
.legend-pct { font-size: 11px; font-weight: 600; width: 32px; text-align: right; }
.drift-chip { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; min-width: 40px; text-align: center; }
.drift-over  { background: rgba(239,68,68,0.12); color: #f87171; }
.drift-under { background: rgba(34,197,94,0.10); color: #4ade80; }
.drift-ok    { background: rgba(139,150,176,0.08); color: var(--text3); }

/* DRIFT BARS */
.drift-rows { display: flex; flex-direction: column; gap: 10px; }
.drift-row { border: 1px solid transparent; border-radius: 8px; padding: 4px 6px; margin: 0 -6px; }
.drift-row-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.drift-row-name { font-size: 12px; font-weight: 500; }
.drift-row-vals { font-size: 11px; color: var(--text3); }
.drift-bar-bg { height: 5px; background: var(--surface2); border-radius: 3px; position: relative; overflow: visible; }
.drift-bar-actual { height: 5px; border-radius: 3px; }
.drift-target-line { position: absolute; width: 2px; height: 11px; top: -3px; border-radius: 1px; }

/* DATA NOTE */
.data-note { background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.18); border-radius: 8px; padding: 9px 14px; font-size: 12px; color: #fbbf24; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.data-ok   { background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.18);  color: #4ade80; }

/* ========== MOMENTUM PANEL ========== */
.mmt-ctrl { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.section-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.section-badge { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 10px; color: var(--text3); font-weight: 500; }
.period-tabs { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
.period-btn { padding: 5px 14px; border: none; background: none; color: var(--text3); font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.period-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.period-btn:hover:not(.active) { color: var(--text2); }
.mmt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(390px, 1fr)); gap: 12px; }

.mmt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 17px; border-left-width: 3px; }
.mmt-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.mmt-theme { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; }
.mmt-theme-sub { font-size: 11px; color: var(--text3); font-weight: 400; }
.signal-badge { font-size: 11px; padding: 2px 9px; border-radius: 18px; font-weight: 600; }
.sig-selloff { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.22); }
.sig-rally   { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.22); }
.sig-diverge { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.22); }
.sig-mixed   { background: rgba(139,150,176,0.07); color: var(--text3); border: 1px solid var(--border); }

.spread-row { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; padding-bottom: 11px; border-bottom: 1px solid var(--border2); }
.spread-lbl { font-size: 10px; color: var(--text3); width: 78px; flex-shrink: 0; }
.spread-bg  { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; }
.spread-fill { height: 3px; border-radius: 2px; background: var(--warn); transition: width 0.4s; }
.spread-val { font-size: 10px; color: var(--text3); width: 38px; text-align: right; }

.bar-section { margin-bottom: 8px; }
.bar-section-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 5px; padding-left: 56px; opacity: 0.7; }
.bar-rows { display: flex; flex-direction: column; gap: 4px; }
.bar-row { display: grid; grid-template-columns: 52px 1fr 50px; align-items: center; gap: 5px; }
.bar-ticker { font-size: 11px; font-weight: 700; text-align: right; white-space: nowrap; letter-spacing: 0.1px; }
.bar-ticker.holding { color: var(--text); font-size: 12px; }
.bar-ticker.peer    { color: var(--text3); font-weight: 500; }
.bar-track { position: relative; border-radius: 3px; }
.bar-track.ht { height: 18px; }
.bar-track.pt { height: 12px; }
.bar-fill { position: absolute; top: 0; bottom: 0; border-radius: 3px; transition: all 0.4s; }
.bar-zero { position: absolute; top: -2px; bottom: -2px; width: 1px; background: var(--border); }
.bar-val { font-size: 11px; font-weight: 700; white-space: nowrap; }
.bar-val.ht { font-size: 12px; }
.bar-peers-sep { height: 1px; background: var(--border2); margin: 5px 0 7px 56px; }
.bar-nodata { font-size: 10px; color: var(--text3); }

/* HOLDINGS TABLE */
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
.htbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.htbl th { text-align: left; padding: 9px 13px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
.htbl th:nth-child(n+3) { text-align: right; }
.htbl td { padding: 9px 13px; border-bottom: 1px solid var(--border2); white-space: nowrap; }
.htbl td:nth-child(n+3) { text-align: right; font-variant-numeric: tabular-nums; }
.htbl tr:hover td { background: rgba(255,255,255,0.013); }
.thdr-row td { padding: 6px 13px; font-size: 11px; font-weight: 600; background: var(--surface2); border-bottom: 1px solid var(--border); }
.tkr { font-weight: 700; }
.sublayer-tag { font-size: 10px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border2); padding: 1px 6px; border-radius: 4px; margin-left: 5px; }
</style>
</head>

};

// ─── Load portfolio data ──────────────────────────────────────────────────────
const PD = window.PORTFOLIO_DATA || null;

function getThemes() {
  if (PD) return PD.themes.filter(t => t.actual_value > 0 || t.target_pct > 0);
  return STATIC_THEMES;
}
function getLayers() {
  if (PD && PD.layers) return PD.layers.filter(l => l.actual_value > 0 || l.target_pct > 0);
  return getThemes();
}
function getPositions() {
  return PD ? PD.positions : [];
}
function getThemeById(id) {
  return getThemes().find(t => t.id === id);
}
function formatPct(value) {
  return value == null ? '0.0%' : `${value.toFixed(1)}%`;
}
function summarizePhase(name, layerNames) {
  const layers = getLayers().filter(layer => layerNames.includes(layer.name));
  const actualPct = layers.reduce((sum, layer) => sum + layer.actual_pct, 0);
  const targetPct = layers.reduce((sum, layer) => sum + layer.target_pct, 0);
  const dayChangeUsd = layers.reduce((sum, layer) => sum + layer.day_change_usd, 0);
  const actualValue = layers.reduce((sum, layer) => sum + layer.actual_value, 0);
  const dayPct = actualValue ? dayChangeUsd / actualValue * 100 : 0;
  return { name, actualPct, targetPct, drift: actualPct - targetPct, dayPct, dayChangeUsd };
}

// ─── Overview: Summary Cards ─────────────────────────────────────────────────
function buildCards() {
  const el = document.getElementById('summaryCards');
  if (!PD) {
    el.innerHTML = `<div class="card"><div class="card-lbl">Status</div><div class="card-val warn">No Data</div><div class="card-sub">Run parse_portfolio.py</div></div>`;
    return;
  }
  const m = PD.meta;
  const themes = getThemes().filter(t => t.actual_value > 0);
  const ranked = themes.filter(t => t.actual_value > 0);
  const worst = [...ranked].sort((a,b) => a.day_change_usd/a.actual_value - b.day_change_usd/b.actual_value)[0];
  const best  = [...ranked].sort((a,b) => b.day_change_usd/b.actual_value - a.day_change_usd/a.actual_value)[0];
  const present = summarizePhase('Present Themes', ['Silicon Stack', 'AI Infrastructure', 'AI Software']);
  const future = summarizePhase('Next & Future Themes', ['Defense & Drones', 'Space & Orbital Infrastructure']);
  const outside = summarizePhase('Outside Core', ['Medtech', 'Fintech']);
  const f = (v,d=2) => v >= 0 ? `+${v.toFixed(d)}` : v.toFixed(d);
  const c = v => v >= 0 ? 'pos' : 'neg';
  const phaseCard = phase => `<div class="card"><div class="card-lbl">${phase.name}</div><div class="card-val ${c(phase.dayPct)}">${f(phase.dayPct,1)}%</div><div class="card-sub">${phase.actualPct.toFixed(1)}% actual · ${phase.targetPct.toFixed(0)}% target · ${f(phase.drift,1)}% drift</div></div>`;
  const themePerf = t => t ? t.day_change_usd / t.actual_value * 100 : 0;

  el.innerHTML = [
    `<div class="card"><div class="card-lbl">NAV</div><div class="card-val muted">$${m.nav.toLocaleString('en',{maximumFractionDigits:0})}</div><div class="card-sub">${m.position_count} positions · ${m.classified_count} mapped · ${m.unclassified_count} unmapped</div></div>`,
    `<div class="card"><div class="card-lbl">Stock Value</div><div class="card-val muted">$${m.stock_value.toLocaleString('en',{maximumFractionDigits:0})}</div><div class="card-sub">${m.date}</div></div>`,
    `<div class="card"><div class="card-lbl">Day P&L (Equity)</div><div class="card-val ${c(m.day_change_usd)}">${f(m.day_change_pct,2)}%</div><div class="card-sub">${f(m.day_change_usd,0)} USD</div></div>`,
    phaseCard(present),
    phaseCard(future),
    phaseCard(outside),
    `<div class="card"><div class="card-lbl">Best Theme · 1D</div><div class="card-val ${c(themePerf(best))}">${best.emoji} ${f(themePerf(best),1)}%</div><div class="card-sub">${best.name}</div></div>`,
    `<div class="card"><div class="card-lbl">Worst Theme · 1D</div><div class="card-val neg">${worst.emoji} ${f(themePerf(worst),1)}%</div><div class="card-sub">${worst.name}</div></div>`,
  ].join('');
}

// ─── Overview: Donut ─────────────────────────────────────────────────────────
let donutChart = null;
function buildDonut() {
  const layers = getLayers().filter(t => t.actual_value > 0);
  const labels = layers.map(t => t.emoji + ' ' + t.name);
  const data   = layers.map(t => t.actual_pct);
  const colors = layers.map(t => t.color);

  document.getElementById('donutCenter').textContent = layers.length;
  document.getElementById('donutCenterLbl').textContent = 'layers';

  const ctx = document.getElementById('donutChart').getContext('2d');
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors.map(c=>c+'bb'), borderColor: colors, borderWidth: 1.5, hoverOffset: 5 }] },
    options: { cutout:'68%', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toFixed(1)}%`}} }, animation:{duration:700} }
  });

  document.getElementById('donutLegend').innerHTML = layers.map(t => {
    const dAbs = Math.abs(t.drift);
    const dCls = dAbs < 1 ? 'drift-ok' : t.drift > 0 ? 'drift-over' : 'drift-under';
    const dTxt = `${t.target_pct}% tgt · ${t.drift >= 0 ? '+' : ''}${t.drift.toFixed(1)}%`;
    return `<div class="legend-row">
      <div class="legend-dot" style="background:${t.color}"></div>
      <div class="legend-name">${t.name}</div>
      <div class="legend-pct" style="color:${t.color}">${t.actual_pct.toFixed(1)}%</div>
      <div class="drift-chip ${dCls}">${dTxt}</div>
    </div>`;
  }).join('');
}

// ─── Overview: Drift Bars ────────────────────────────────────────────────────
function buildDriftRows() {
  const themes = getThemes();
  const maxPct = 55; // scale axis to 55%
  document.getElementById('driftRows').innerHTML = themes.filter(t => t.target_pct > 0 || t.actual_pct > 0).map(t => {
    const actualW  = (t.actual_pct / maxPct * 100).toFixed(1);
    const targetW  = (t.target_pct / maxPct * 100).toFixed(1);
    const dAbs     = Math.abs(t.drift);
    const barColor = dAbs < 1 ? t.color + '99' : t.drift > 0 ? '#ef444488' : '#22c55e88';
    return `<div class="drift-row">
      <div class="drift-row-hdr">
        <div class="drift-row-name">${t.emoji} ${t.name}</div>
        <div class="drift-row-vals">${t.actual_pct.toFixed(1)}% actual · ${t.target_pct}% target · <span class="${t.drift>0?'neg':t.drift<-1?'pos':'muted'}">${t.drift>=0?'+':''}${t.drift.toFixed(1)}% drift</span></div>
      </div>
      <div class="drift-bar-bg">
        <div class="drift-bar-actual" style="width:${actualW}%;background:${barColor};height:5px;border-radius:3px;"></div>
        <div class="drift-target-line" style="left:${targetW}%;background:${t.color};"></div>
      </div>
    </div>`;
  }).join('');
}

// ─── Overview: Day P&L Bar ───────────────────────────────────────────────────
let pnlChart = null;
let overviewPeriod = 'd1';

document.querySelectorAll('#overviewPeriodTabs .period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    overviewPeriod = btn.dataset.p;
    document.querySelectorAll('#overviewPeriodTabs .period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildDayPnl();

function themeWeightedReturn(theme, period) {
  const holdings = getPositions().filter(p => p.theme_id === theme.id);
  let weighted = 0;
  let base = 0;
  holdings.forEach(p => {
    const tv = PEER_RETURNS[p.ticker]?.[period];
    const value = tv ?? (period === 'd1' ? p.day_change_pct : null);
    if (value == null) return;
    weighted += value * p.value;
    base += p.value;
  });
  return base ? +(weighted / base).toFixed(2) : null;
}

function buildDayPnl() {
  const themes = getThemes().filter(t => t.actual_value > 0);
  const pcts   = themes.map(t => themeWeightedReturn(t, overviewPeriod));
  const date   = PEER_RETURNS_META.as_of ? new Date(PEER_RETURNS_META.as_of).toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' }) : (PD ? PD.meta.date : 'Static Data');
  const periodLabel = {d1:'1D', w1:'1W', m1:'1M'}[overviewPeriod];
  document.getElementById('dayPnlTitle').textContent = `Theme Performance · ${periodLabel} · TradingView ${date}`;

  const ctx = document.getElementById('dayPnlChart').getContext('2d');
  if (pnlChart) pnlChart.destroy();
  pnlChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: themes.map(t => t.emoji + ' ' + t.name),
      datasets: [{
        label: periodLabel,
        data:   pcts,
        backgroundColor: pcts.map(v => v == null ? '#64748b55' : v >= 0 ? '#22c55e99' : '#ef444455'),
        borderColor:     pcts.map(v => v == null ? '#64748b' : v >= 0 ? '#22c55e' : '#ef4444'),
        borderWidth: 1.5, borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend:{display:false}, tooltip:{callbacks:{label:c=> c.parsed.x == null ? ' no TradingView data' : ` ${c.parsed.x.toFixed(2)}%`}} },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#556070', callback:v=>v+'%'} },
        y: { grid:{display:false}, ticks:{color:'#8b96b0', font:{size:11}, autoSkip:false} }
      },
      animation:{duration:500}
    }
  });
}

// ─── Momentum Panel ──────────────────────────────────────────────────────────
let curPeriod = 'd1';

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    curPeriod = btn.dataset.p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildMomentumGrid();
  });
});

function computeSignal(holdings, peers, period) {
  const vals = [
    ...holdings.map(h => h[period] ?? (period === 'd1' ? h.day_change_pct : null)),
    ...peers.map(p => p[period])
  ].filter(v => v != null);
  if (vals.length < 2) return {cls:'sig-mixed', label:'— No Data'};
  const spread = Math.max(...vals) - Math.min(...vals);
  const allNeg = vals.every(v => v < 0);
  const allPos = vals.every(v => v > 0);
  if (spread < 5 && allNeg) return {cls:'sig-selloff', label:'🔴 Theme Selloff'};
  if (spread < 5 && allPos) return {cls:'sig-rally',   label:'🟢 Theme Rally'};
  if (spread > 8)            return {cls:'sig-diverge', label:'🟡 Diverging'};
  return {cls:'sig-mixed', label:'⚪ Mixed'};
}

function getScale(holdings, peers, period) {
  const vals = [
    ...holdings.map(h => h[period] ?? (period === 'd1' ? h.day_change_pct : null)),
    ...peers.map(p => p[period])
  ].filter(v => v != null);
  if (!vals.length) return {min:-15, max:0};
  return { min: Math.min(...vals, 0) * 1.2, max: Math.max(...vals, 0) * 1.2 || 1 };
}

function barRow(ticker, value, scale, isHolding) {
  const tClass = `bar-ticker ${isHolding ? 'holding' : 'peer'}`;
  if (value == null) return `<div class="bar-row">
    <div class="${tClass}">${ticker}</div>
    <div class="bar-track ${isHolding?'ht':'pt'}"><span style="position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);">—</span></div>
    <div class="bar-val muted" style="font-size:10px;">—</div>
  </div>`;

  const range = scale.max - scale.min || 1;
  const zp = (-scale.min / range * 100).toFixed(2);
  const vp = ((value - scale.min) / range * 100).toFixed(2);
  const [left, width] = value >= 0 ? [zp, (vp-zp).toFixed(2)] : [vp, (zp-vp).toFixed(2)];
  const color = value >= 0 ? '#22c55e' : '#ef4444';
  const op    = isHolding ? 0.88 : 0.42;
  const vCls  = value >= 0 ? 'pos' : 'neg';
  return `<div class="bar-row">
    <div class="${tClass}">${ticker}</div>
    <div class="bar-track ${isHolding?'ht':'pt'}">
      <div class="bar-fill" style="left:${left}%;width:${width}%;background:${color};opacity:${op};top:${isHolding?'2px':'2px'};bottom:${isHolding?'2px':'2px'};"></div>
      <div class="bar-zero" style="left:${zp}%"></div>
    </div>
    <div class="bar-val ${isHolding?'ht':''} ${vCls}">${value>0?'+':''}${value.toFixed(1)}%</div>
  </div>`;
}

function buildMomentumGrid() {
  const grid = document.getElementById('mmtGrid');
  grid.innerHTML = '';
  const themes = getThemes();
  const themeMap = Object.fromEntries(themes.map(t => [t.id, t]));
  const layers = getLayers();
  const positions = getPositions();

  layers.filter(t => t.actual_value > 0 || t.target_pct > 0).forEach(layer => {
    const layerThemeIds = layer.theme_ids || themes.filter(t => t.layer === layer.name).map(t => t.id);
    // Build holdings with momentum values from positions
    const holdings = positions
      .filter(p => p.layer === layer.name)
      .map(p => ({
        ticker: p.ticker,
        day_change_pct: p.day_change_pct,
        d1: p.day_change_pct,
        w1: null,  // 1W/1M not in CSV; to be added via price history
        m1: null,
      }))
      .sort((a,b) => (a.d1 ?? 999) - (b.d1 ?? 999));

    holdings.forEach(h => {
      const history = PEER_RETURNS[h.ticker] || {};
      h.w1 = history.w1 ?? null;
      h.m1 = history.m1 ?? null;
    });

    const peerSet = new Set();
    layerThemeIds.forEach(tid => (themeMap[tid]?.peers || []).forEach(ticker => peerSet.add(ticker)));
    const peers = [...peerSet].map(ticker => ({
      ticker,
      d1: PEER_RETURNS[ticker]?.d1 ?? null,
      w1: PEER_RETURNS[ticker]?.w1 ?? null,
      m1: PEER_RETURNS[ticker]?.m1 ?? null,
    }));
    const scale = getScale(holdings, peers, curPeriod);

    // Sort by current period
    const sortedH = [...holdings].sort((a,b) => {
      const av = a[curPeriod] ?? 999; const bv = b[curPeriod] ?? 999;
      return av - bv;
    });
    const sortedP = [...peers].sort((a,b) => {
      const av = a[curPeriod] ?? 999; const bv = b[curPeriod] ?? 999;
      return av - bv;
    });

    const signal = computeSignal(holdings, peers, curPeriod);
    const allVals = [...holdings, ...peers].map(t => t[curPeriod] ?? (curPeriod==='d1'?t.day_change_pct:null)).filter(v=>v!=null);
    const spread  = allVals.length >= 2 ? (Math.max(...allVals) - Math.min(...allVals)).toFixed(1) : null;
    const spreadW = spread ? Math.min(parseFloat(spread)/20*100,100).toFixed(0) : 0;

    const hRows = sortedH.map(h => barRow(h.ticker, h[curPeriod] ?? (curPeriod==='d1'?h.day_change_pct:null), scale, true)).join('');
    const pRows = sortedP.map(p => barRow(p.ticker, p[curPeriod], scale, false)).join('');

    const card = document.createElement('div');
    card.className = `mmt-card`;
    card.style.borderLeftColor = layer.color;
    card.innerHTML = `
      <div class="mmt-card-hdr">
        <div class="mmt-theme">
          <span>${layer.emoji}</span><span>${layer.name}</span>
          <span class="mmt-theme-sub">${holdings.length} pos</span>
        </div>
        <div class="signal-badge ${signal.cls}">${signal.label}</div>
      </div>
      <div class="spread-row">
        <div class="spread-lbl">Spread (range)</div>
        <div class="spread-bg"><div class="spread-fill" style="width:${spreadW}%"></div></div>
        <div class="spread-val">${spread ? spread + '%' : '—'}</div>
      </div>
      <div class="bar-section">
        <div class="bar-section-lbl" style="color:${layer.color}">▶ Holdings</div>
        <div class="bar-rows">${hRows || '<div style="padding-left:56px;font-size:11px;color:var(--text3);">No positions</div>'}</div>
      </div>
      <div class="bar-peers-sep"></div>
      <div class="bar-section">
        <div class="bar-section-lbl">⬚ Peer Universe</div>
        <div class="bar-rows">${pRows || '<div style="padding-left:56px;font-size:11px;color:var(--text3);">—</div>'}</div>
      </div>`;
    grid.appendChild(card);
  });
}

// ─── Holdings Table ───────────────────────────────────────────────────────────
function buildHoldings() {
  const positions = getPositions();
  const themes    = getThemes();
  const themeMap  = Object.fromEntries(themes.map(t => [t.id, t]));
  const f = v => v >= 0 ? `<span class="pos">+${v.toFixed(2)}%</span>` : `<span class="neg">${v.toFixed(2)}%</span>`;
  const fd = v => v >= 0 ? `<span class="pos">+${v.toFixed(2)}</span>` : `<span class="neg">${v.toFixed(2)}</span>`;

  // Group by theme
  const grouped = {};
  positions.forEach(p => {
    if (!grouped[p.theme_id]) grouped[p.theme_id] = [];
    grouped[p.theme_id].push(p);
  });

  let html = '';
  themes.filter(t => grouped[t.id]?.length).forEach(theme => {
    const bucket = grouped[theme.id] || [];
    const themePnl = bucket.reduce((s,p) => s + p.unrealized_pnl, 0);
    const themeDayUsd = bucket.reduce((s,p) => s + p.day_change_usd, 0);
    html += `<tr class="thdr-row"><td colspan="10" style="color:${theme.color}">
      ${theme.emoji} ${theme.name} &nbsp;·&nbsp; ${bucket.length} pos &nbsp;·&nbsp;
      Unrealized: ${themePnl>=0?'<span class="pos">':' <span class="neg">'}${themePnl>=0?'+':''}$${themePnl.toFixed(0)}</span> &nbsp;·&nbsp;
      Today: ${themeDayUsd>=0?'<span class="pos">':'<span class="neg">'}${themeDayUsd>=0?'+':''}$${themeDayUsd.toFixed(0)}</span>
    </td></tr>`;
    bucket.sort((a,b) => b.value - a.value).forEach(p => {
      const sub = p.sub_layer || SUBLAYER[p.ticker] || p.theme_id;
      html += `<tr>
        <td><span class="tkr">${p.ticker}</span></td>
        <td><span class="sublayer-tag">${sub}</span></td>
        <td>${p.qty}</td>
        <td>$${p.close_price.toFixed(2)}</td>
        <td>$${p.value.toFixed(2)}</td>
        <td>$${p.cost_price.toFixed(2)}</td>
        <td>${fd(p.unrealized_pnl)}</td>
        <td>${f(p.day_change_pct)}</td>
        <td>${fd(p.day_change_usd)}</td>
        <td><span style="font-size:11px;color:${theme.color}">${theme.emoji}</span></td>
      </tr>`;
    });
  });
  document.getElementById('holdingsTbody').innerHTML = html;
}

buildCards();
