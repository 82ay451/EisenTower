<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="catcha-report-updated" content="2026-06-19 17:31 BKK">
<title>Catcha Wave</title>
<!-- PORTFOLIO_DATA_EXTERNAL -->
<script src="portfolio_data.js"></script>
<!-- /PORTFOLIO_DATA_EXTERNAL -->
<script src="peer_returns.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="catcha_wave.css">

</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <a class="back-link" href="../Hub/EisenTower_Hub.html">Back to EisenTower</a>
    <div class="hdr-brand">
      <div class="hdr-logo">🌊</div>
      <div>
        <div class="hdr-title">Catcha Wave</div>
        <div class="hdr-tagline">Stay in Momentum.</div>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <span id="dataSourceBadge"></span>
    <span id="hdrDate"></span>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('overview',this)">Overview</button>
  <button class="nav-btn" onclick="showPage('momentum',this)">🌊 Theme Momentum</button>
  <button class="nav-btn" onclick="showPage('stage',this)">Stage</button>
  <button class="nav-btn" onclick="showPage('holdings',this)">Weekly Rebalance</button>
  <button class="nav-btn" onclick="showPage('theme-map',this)">Theme Map</button>
</nav>

<!-- OVERVIEW -->
<div id="page-overview" class="page active">
  <div class="wrap">
    <div class="cards" id="summaryCards"></div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">Allocation by Theme</div>
        <div class="donut-wrap">
          <canvas id="themeAllocChart"></canvas>
          <div class="donut-center">
            <div class="donut-center-val" id="themeAllocCenter">—</div>
            <div class="donut-center-lbl" id="themeAllocCenterLbl">themes</div>
          </div>
        </div>
        <div class="legend" id="themeAllocLegend"></div>
      </div>
      <div class="panel">
        <div class="panel-title">Theme Drift · Actual vs Target</div>
        <div class="drift-rows" id="driftRows"></div>
      </div>
    </div>
    <div class="panel" style="margin-top:14px;">
      <div class="mmt-ctrl" style="margin-bottom:12px;">
        <div class="panel-title" id="dayPnlTitle" style="margin-bottom:0;">Theme Performance</div>
        <div class="period-tabs" id="overviewPeriodTabs">
          <button class="period-btn active" data-p="d1">1D</button>
          <button class="period-btn" data-p="w1">1W</button>
          <button class="period-btn" data-p="m1">1M</button>
        </div>
      </div>
      <canvas id="dayPnlChart" style="max-height:220px;"></canvas>
    </div>
  </div>
</div>

<!-- MOMENTUM -->
<div id="page-momentum" class="page">
  <div class="wrap">
    <div class="mmt-ctrl">
      <div class="section-title">Theme Momentum <span class="section-badge" id="peerReturnBadge">Holdings vs Peers</span></div>
      <div class="period-tabs">
        <button class="period-btn active" data-p="d1">1D</button>
        <button class="period-btn" data-p="w1">1W</button>
        <button class="period-btn" data-p="m1">1M</button>
      </div>
    </div>
    <div class="mmt-grid" id="mmtGrid"></div>
  </div>
</div>

<!-- STAGE -->
<div id="page-stage" class="page">
  <div class="wrap">
    <div class="stage-tab-head">
      <div class="section-title">Stage by Theme <span class="section-badge">Theme source matrix</span></div>
      <div class="stage-source" id="stageSource"></div>
    </div>
    <div class="stage-board" id="stageBoard"></div>
  </div>
</div>

<!-- HOLDINGS -->
<div id="page-holdings" class="page">
  <div class="wrap">
    <div class="mmt-ctrl">
      <div class="section-title">Weekly Rebalance <span class="section-badge">Theme action queue</span></div>
    </div>
    <div class="rebalance-grid" id="rebalanceGrid"></div>
  </div>
</div>

<!-- THEME MAP -->
<div id="page-theme-map" class="page">
  <div class="wrap">
    <div class="mmt-ctrl">
      <div class="section-title">Theme Map <span class="section-badge">Master reference</span></div>
    </div>
    <div class="theme-map-tree" id="themeMapGrid"></div>
  </div>
</div>

<script src="catcha_wave_app.js"></script>
</body>
</html>
